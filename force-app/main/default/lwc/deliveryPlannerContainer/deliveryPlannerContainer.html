<template>
  <div class="slds-grid slds-wrap slds-gutters_x-small">
    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-large-size_1-of-3">
      <div class="slds-m-bottom_medium">
        <c-account-selector onselected={updateDeliveryPoints}></c-account-selector>
      </div>
    </div>
    <div class="slds-col slds-size_1-of-1 slds-medium-size_2-of-3 slds-large-size_2-of-3 slds-m-bottom_medium">
      <lightning-card hide-header label="Calculate Delivery Route">
        <div class="slds-m-around_medium">
          <div class="buttons">
            <lightning-button variant="brand" label="Calculate Delivery Route" disabled={isLoading} onclick={calculateDeliveryRoute}></lightning-button>
            <lightning-button variant="destructive-text" label="Reset" onclick={resetDeliveryRoute}></lightning-button>
          </div>
          <c-route-calculator coordinates={deliveryPoints}></c-route-calculator>
        </div>
      </lightning-card>
    </div>
  </div>
</template>
